<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuestionario PyME • Walmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }

    :root {
      --wm-blue:   #0053e2;
      --wm-spark:  #ffc220;
      --wm-dark:   #001e60;
      --navy:      #001e60;
      --blue:      #0053e2;
      --cyan:      #00B0F0;
      --gold:      #ffc220;
    }

    /* Sidebar izquierda */
    .sidebar {
      background: linear-gradient(180deg, var(--wm-dark) 0%, var(--wm-blue) 100%);
      width: 260px;
      min-height: 100vh;
      position: fixed; left:0; top:0;
      display: flex; flex-direction: column;
      padding: 28px 24px;
      z-index: 40;
    }

    /* Progress ring track */
    .ring-track { stroke: rgba(255,255,255,0.15); }
    .ring-fill  {
      stroke: var(--wm-spark);
      stroke-linecap: round;
      transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);
    }

    /* Contenido principal desplazado por sidebar */
    .main-offset {
      margin-left: 0;
      padding-top: 64px;  /* header mobile */
    }
    @media (min-width: 768px) {
      .main-offset { margin-left: 260px; padding-top: 0; }
      .sidebar { display: flex !important; }
      .mobile-header { display: none !important; }
    }
    @media (max-width: 767px) {
      .sidebar { display: none; }
    }

    /* Animacion pregunta */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(28px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .slide-up { animation: slideUp 0.38s cubic-bezier(.22,.68,0,1.2) both; }

    /* Progress bar mobile */
    .progress-fill {
      transition: width .5s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(90deg, var(--wm-blue), #00c6ff);
    }

    /* Cards de opciones (compatibles con question.html) */
    .opt-card {
      transition: all 0.18s ease;
      cursor: pointer;
      border: 2px solid #e5e7eb;
    }
    .opt-card:hover { border-color: var(--wm-blue); background: #eef3fd; transform: translateX(4px); }
    .opt-card.selected { border-color: var(--wm-dark); background: #dde8fb; }

    .scale-btn {
      width:60px; height:60px;
      border:2px solid #d1d5db;
      border-radius:50%;
      font-size:1.3rem; font-weight:700;
      transition:all .18s ease;
      cursor:pointer;
    }
    .scale-btn:hover  { border-color:var(--wm-blue); background:var(--wm-blue); color:#fff; transform:scale(1.1); }
    .scale-btn.selected { background:var(--wm-dark); border-color:var(--wm-dark); color:var(--gold); }

    .multi-card {
      cursor:pointer;
      border:2px solid #e5e7eb;
      transition:all .15s ease;
    }
    .multi-card:hover  { border-color:var(--wm-blue); background:#eef3fd; }
    .multi-card.checked { border-color:var(--wm-dark); background:#dde8fb; }

    .btn-continue {
      background: var(--wm-blue); color:#fff;
      transition: all .2s ease;
    }
    .btn-continue:hover { background: var(--wm-dark); transform:translateX(4px); }

    textarea:focus { outline:none; border-color:var(--wm-blue); }
    .htmx-indicator { display:none; }
    .htmx-request .htmx-indicator { display:inline-block; }

    /* Textos navy que usa question.html */
    .text-navy { color: var(--wm-dark); }
    .border-navy { border-color: var(--wm-dark); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ==================== SIDEBAR (desktop) ==================== -->
  <aside class="sidebar">

    <!-- Logo -->
    <div class="flex items-center gap-2 mb-10">
      <svg width="30" height="30" viewBox="0 0 60 60">
        <g fill="#ffc220">
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(0 30 30)"/>
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(60 30 30)"/>
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(120 30 30)"/>
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(180 30 30)"/>
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(240 30 30)"/>
          <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(300 30 30)"/>
        </g>
      </svg>
      <div>
        <div class="text-white font-black text-sm">Walmart Chile</div>
        <div class="text-white/50 text-xs">Programa PyME</div>
      </div>
    </div>

    <!-- Progress ring -->
    <div class="flex flex-col items-center mb-10">
      <div class="relative">
        <svg width="110" height="110" viewBox="0 0 110 110">
          <circle class="ring-track" cx="55" cy="55" r="46"
                  fill="none" stroke-width="8"/>
          <circle id="ring-fill" class="ring-fill" cx="55" cy="55" r="46"
                  fill="none" stroke-width="8"
                  stroke-dasharray="289"
                  stroke-dashoffset="{{ (1 - progress/100) * 289 }}"
                  transform="rotate(-90 55 55)"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span id="pct-label" class="text-2xl font-black text-white">{{ progress }}%</span>
          <span class="text-white/50 text-xs">completado</span>
        </div>
      </div>
      <p id="q-label" class="text-white/70 text-xs mt-3">
        Pregunta <span id="q-num-side">{{ q_index + 1 }}</span> de {{ total }}
      </p>
    </div>

    <!-- Empresa -->
    {% if company %}
    <div class="bg-white/10 rounded-xl px-4 py-3 mb-6">
      <p class="text-white/50 text-xs mb-1">Respondiendo como</p>
      <p class="text-white font-bold text-sm truncate">{{ company }}</p>
    </div>
    {% endif %}

    <!-- Separador -->
    <div class="flex-1"></div>

    <!-- Link panel admin -->
    <a href="/resultados"
       class="flex items-center gap-2 text-white/40 hover:text-white/80 text-xs
              transition-colors mt-auto">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
      </svg>
      Panel de resultados
    </a>
  </aside>

  <!-- ==================== HEADER MOBILE ==================== -->
  <header class="mobile-header fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
    <div class="px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg width="24" height="24" viewBox="0 0 60 60">
          <g fill="#ffc220">
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(0 30 30)"/>
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(60 30 30)"/>
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(120 30 30)"/>
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(180 30 30)"/>
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(240 30 30)"/>
            <ellipse cx="30" cy="7" rx="4.2" ry="8.5" transform="rotate(300 30 30)"/>
          </g>
        </svg>
        <span class="font-bold text-sm" style="color:#001e60">PyME Survey</span>
      </div>
      <span id="q-counter-mobile" class="text-xs text-gray-500 font-medium">
        {{ q_index + 1 }} / {{ total }}
      </span>
    </div>
    <div class="h-1 bg-gray-100">
      <div id="progress-bar-mobile" class="progress-fill h-full"
           style="width:{{ progress }}%"></div>
    </div>
  </header>

  <!-- ==================== CONTENIDO PRINCIPAL ==================== -->
  <main class="main-offset min-h-screen flex flex-col">
    <div id="question-wrap" class="flex-1 flex flex-col justify-center">
      {% include 'question.html' %}
    </div>
  </main>

  <script>
  /* Actualiza ring, barra y contadores tras cada swap HTMX */
  document.body.addEventListener('htmx:afterSwap', function() {
    const wrap = document.getElementById('question-wrap');
    if (!wrap) return;

    const pctEl  = wrap.querySelector('[data-progress]');
    const qnumEl = wrap.querySelector('[data-qnum]');
    const pct    = pctEl  ? parseInt(pctEl.dataset.progress)  : null;
    const qnum   = qnumEl ? parseInt(qnumEl.dataset.qnum)     : null;

    if (pct !== null) {
      // Ring SVG
      const fill = document.getElementById('ring-fill');
      if (fill) fill.setAttribute('stroke-dashoffset', ((1 - pct/100) * 289).toFixed(1));
      const lbl  = document.getElementById('pct-label');
      if (lbl)  lbl.textContent = pct + '%';
      // Barra mobile
      const bar  = document.getElementById('progress-bar-mobile');
      if (bar)  bar.style.width = pct + '%';
    }
    if (qnum !== null) {
      const ns = document.getElementById('q-num-side');
      if (ns) ns.textContent = qnum;
      const nm = document.getElementById('q-counter-mobile');
      if (nm) nm.textContent = qnum + ' / {{ total }}';
    }
  });
  </script>
</body>
</html>
