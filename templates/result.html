<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias • PyME Walmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Bogle', 'Everyday Sans', 'Inter', sans-serif; }
    :root { --navy:#002060; --blue:#017DFC; --cyan:#00B0F0; --gold:#FFC000; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes pulse-spark {
      0%,100% { transform: scale(1) rotate(0deg); }
      50%     { transform: scale(1.08) rotate(6deg); }
    }
    .fade-up   { animation: fadeUp .5s ease both; }
    .fade-up-1 { animation-delay:.1s; }
    .fade-up-2 { animation-delay:.3s; }
    .fade-up-3 { animation-delay:.5s; }
    .spark-anim { animation: pulse-spark 2.5s ease-in-out infinite; }
  </style>
</head>
<body style="background:linear-gradient(135deg,#f0f4ff 0%,#e8f5fb 100%); min-height:100vh;">

<!-- Header -->
<header class="bg-white shadow-sm">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <img src="/static/walmart_logo_clean.png" alt="Walmart Logo" class="h-6 object-contain" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/12/Walmart_logo.svg'; this.style.height='20px'">
      <div>
        <div class="font-bold text-sm text-slate-700">Walmart Chile &bull; Programa PyME</div>
        <div class="text-xs text-gray-400">Diagnóstico de Madurez Retail</div>
      </div>
    </div>
  </div>
  <div class="h-1 w-full" style="background:linear-gradient(90deg,var(--blue),var(--gold))"></div>
</header>

<main class="max-w-2xl mx-auto px-4 py-16 text-center">

  <!-- Spark animado (Logo Walmart Original con Spark) -->
  <div class="flex justify-center mb-6 fade-up fade-up-1">
    <div class="spark-anim">
      <img src="/static/logo_walmart_original.png" alt="Walmart Logo" class="h-14 object-contain" onerror="this.src='/static/walmart_logo_clean.png'">
    </div>
  </div>

  <!-- Mensaje de gracias -->
  <div class="fade-up fade-up-1 px-4 mt-8">
    <h1 class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight" style="color:var(--navy)">
      ¡Muchas gracias, pronto tendrás noticias! 👩🏻‍💻✨
    </h1>
    <p class="text-gray-500 text-base md:text-lg leading-relaxed max-w-lg mx-auto">
      Completaste con éxito el cuestionario de diagnóstico de madurez del
      <strong style="color:var(--navy)">Programa PyME Walmart Chile</strong>.
      Tu información fue registrada exitosamente.
    </p>
  </div>

  <!-- Mensaje de cierre simplificado -->
  <div class="mt-12 fade-up fade-up-3">
    <p class="mt-6 text-xs text-gray-300">
      Walmart Chile &bull; Programa de Desarrollo PyME
    </p>
  </div>

</main>
</body>
</html>
