services:
  - type: web
    name: pyme-survey
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PUBLIC_URL
        value: https://pyme-survey.onrender.com